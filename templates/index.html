<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOS-ZERO Error Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

  <style>
    /* 1. 글로벌 테마 및 레이아웃 초기화 */
    body {
      margin: 0;
      padding: 40px 20px;
      background-color: #fcfbf9; /* 따뜻한 라이트 스톤 */
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      color: #292524;
      transition: background-color 0.3s, color 0.3s;
    }
    html.dark body {
      background-color: #1c1917; /* 묵직한 다크 스톤 */
      color: #f5f4f0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    header {
      border-bottom: 1px solid #e3e2dd;
      padding-bottom: 20px;
    }
    html.dark header {
      border-bottom-color: #3a3531;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .main-title { font-size: 1.75rem; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
    .subtitle { font-size: 0.95rem; color: #78716c; margin: 6px 0 0 0; }

    /* 2. 상단 테마 스위처 */
    .theme-switcher { display: flex; background: #f5f4f0; padding: 4px; border-radius: 6px; border: 1px solid #e3e2dd; }
    html.dark .theme-switcher { background: #292524; border-color: #3a3531; }
    .theme-btn { background: none; border: none; padding: 6px 12px; font-size: 0.8rem; font-weight: 500; color: #78716c; cursor: pointer; border-radius: 4px; }
    .theme-btn.active { background: #ffffff; color: #292524; font-weight: 600; }
    html.dark .theme-btn.active { background: #1c1917; color: #f5f4f0; }

    /* 3. 공통 컴포넌트 플랫 카드 (그림자X) */
    .flat-card {
      background-color: #ffffff;
      border: 1px solid #e3e2dd;
      border-radius: 8px;
      padding: 32px;
    }
    html.dark .flat-card {
      background-color: #292524;
      border-color: #3a3531;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #78716c;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    /* 4. 파일 업로드 영역 패치 */
    .upload-area {
      border: 1px dashed #e3e2dd;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      border-radius: 6px;
      background-color: #ffffff;
      transition: background-color 0.2s, border-color 0.2s;
    }
    html.dark .upload-area {
      border-color: #57534e;
      background-color: #1c1917;
    }
    .upload-label { font-weight: 600; font-size: 1rem; color: #292524; }
    html.dark .upload-label { color: #f5f4f0; }
    .file-name { margin-top: 12px; font-size: 0.9rem; color: #78716c; font-weight: 500; }

    /* 5. X, Y축 셋팅 및 드롭다운(Select) 영역 (다크모드 완벽 반영) */
    .axis-mapping-container {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e3e2dd;
      display: flex;
      gap: 20px;
      align-items: flex-end;
    }
    html.dark .axis-mapping-container {
      border-top-color: #3a3531;
    }

    .axis-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .axis-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #78716c;
    }

    /* 드롭다운 양식 라이트/다크 자동 대응 */
    .axis-select {
      padding: 10px;
      border: 1px solid #e3e2dd;
      border-radius: 6px;
      background-color: #ffffff;
      color: #292524;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }
    html.dark .axis-select {
      border-color: #57534e;
      background-color: #1c1917;
      color: #f5f4f0;
    }
    .axis-select option {
      background-color: #ffffff;
      color: #292524;
    }
    html.dark .axis-select option {
      background-color: #1c1917;
      color: #f5f4f0;
    }

    /* 메인 분석 버튼 */
    .submit-btn {
      background-color: #292524;
      color: #ffffff;
      border: none;
      padding: 11px 24px;
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    html.dark .submit-btn {
      background-color: #57534e;
      color: #f5f4f0;
    }
    .submit-btn:hover { background-color: #44403c; }
    html.dark .submit-btn:hover { background-color: #78716c; }

    /* 6. 결과 그리드 및 데이터 테이블 */
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    @media (max-width: 900px) { .results-grid { grid-template-columns: 1fr; } }

    .feature-table { width: 100%; border-collapse: collapse; }
    .feature-table th { text-align: left; font-size: 0.8rem; color: #78716c; padding-bottom: 12px; border-bottom: 1px solid #e3e2dd; }
    html.dark .feature-table th { border-bottom-color: #3a3531; }
    .feature-table td { padding: 14px 0; border-bottom: 1px solid #f5f4f0; font-size: 0.9rem; }
    html.dark .feature-table td { border-bottom-color: #1c1917; }
    .feature-table td.mono { font-family: monospace; font-weight: 500; color: #292524; }
    html.dark .feature-table td.mono { color: #d6d3d1; }

    .diagnostic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }

    /* 7. 아코디언 내부 세련된 학술지 리포트 카드 */
    .academic-card {
      background: #ffffff;
      border: 1px solid #e3e2dd;
      border-radius: 8px;
      padding: 24px;
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    html.dark .academic-card { background: #292524; border-color: #3a3531; }
    .academic-title { font-size: 1.05rem; font-weight: 600; margin: 0; color: #292524; }
    html.dark .academic-title { color: #f5f4f0; }

    .academic-meta-badge {
      display: inline-flex;
      background-color: #f5f4f0;
      color: #78716c;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      width: fit-content;
      border: 1px solid #e3e2dd;
    }
    html.dark .academic-meta-badge { background-color: #1c1917; color: #a8a29e; border-color: #3a3531; }

    .ai-summary-box { background: #fdfdfb; border-left: 4px solid #a8a29e; padding: 14px; border-radius: 0 4px 4px 0; }
    html.dark .ai-summary-box { background: #23201f; border-left-color: #57534e; }
    .ai-summary-tag { font-size: 0.75rem; font-weight: 700; color: #78716c; display: block; margin-bottom: 4px; }
    html.dark .ai-summary-tag { color: #a8a29e; }
    .ai-summary-text { font-size: 0.9rem; color: #57534e; margin: 0; line-height: 1.6; }
    html.dark .ai-summary-text { color: #d6d3d1; }

    .view-paper-btn { align-self: flex-end; background-color: #44403c; color: #f5f4f0; padding: 8px 16px; font-size: 0.85rem; font-weight: 500; border-radius: 6px; text-decoration: none; }
    html.dark .view-paper-btn { background-color: #57534e; }

    /* 8. 아코디언 토글 링크 버튼 스타일 */
    .ref-section { margin-top: 12px; border-top: 1px dashed #e3e2dd; padding-top: 8px; }
    html.dark .ref-section { border-top-color: #3a3531; }
    .ref-toggle-btn {
      width: 100%; background: none; border: none; padding: 12px 0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: #78716c;
    }
    html.dark .ref-toggle-btn { color: #a8a29e; }
    .ref-chevron { transition: transform 0.2s; }
    .ref-toggle-btn.open .ref-chevron { transform: rotate(180deg); }

    /* 9. 기타 상태 관리 유틸리티 */
    .hidden { display: none !important; }
    .error-banner { background-color: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; padding: 16px; border-radius: 6px; }
    .loading-area { text-align: center; padding: 20px; color:#78716c; }
  </style>
</head>
<body>

  <div class="container">
    
    <header class="header-row">
      <div>
        <h1 class="main-title">MOS-ZERO Error Analyzer</h1>
        <p class="subtitle">C-V 불량 원인 분류 및 학술 문헌 매칭 시스템</p>
      </div>
      <div class="theme-switcher" role="group" aria-label="테마 선택">
        <button class="theme-btn active" id="themeLight">Light</button>
        <button class="theme-btn" id="themeDark">Dark</button>
      </div>
    </header>

    {% if not models_ok %}
    <div class="error-banner">
      모델 파일을 찾을 수 없습니다. <code>output/hybrid_models.pkl</code> 경로의 리소스를 복구해 주세요.
    </div>
    {% else %}

    <section class="flat-card">
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".csv,.txt" hidden />
        <div class="upload-label">측정 데이터 파일 선택 (CSV / TXT)</div>
        <div class="upload-hint" style="font-size: 0.85rem; color: #78716c; margin-top: 4px;">구분자 자동 감지</div>
      </div>
      <div class="file-name hidden" id="fileName"></div>

      <div id="colSelectArea" class="hidden axis-mapping-container">
        <div class="axis-group">
          <label class="axis-label">Gate Voltage (X)</label>
          <select id="vCol" class="axis-select"></select>
        </div>
        <div class="axis-group">
          <label class="axis-label">Capacitance (Y)</label>
          <select id="cCol" class="axis-select"></select>
        </div>
        <button id="analyzeBtn" class="submit-btn">분석 실행</button>
      </div>
    </section>

    <div id="loadingArea" class="loading-area hidden">
      <span>데이터 분석 알고리즘 가동 중...</span>
    </div>

    <div id="errorArea" class="error-banner hidden"></div>

    <div id="resultsSection" class="hidden" style="display: flex; flex-direction: column; gap: 32px;">
      
      <div class="results-grid">
        <div class="flat-card">
          <div class="section-label">Signal Analysis</div>
          <div id="plotlyChart"></div>
        </div>
        <div class="flat-card">
          <div class="section-label">Extracted Features</div>
          <table class="feature-table">
            <thead><tr><th>Parameter</th><th>Value</th></tr></thead>
            <tbody id="featureBody"></tbody>
          </table>
        </div>
      </div>

      <div class="flat-card">
        <div class="section-label">Diagnostic Report</div>
        <div id="reportGrid" class="diagnostic-grid"></div>
      </div>
    </div>

    {% endif %}
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
