<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOS-ZERO Error Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

  <style>
    /* 참조 문헌 영역 컨테이너 */
    .references-section {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px dashed #e5e7eb;
    }

    .references-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    .papers-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 12px;
    }

    /* 정갈한 학술지 카드 개별 레이아웃 */
    .academic-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }

    .academic-card:hover {
      transform: translateY(-2px);
      border-color: #cbd5e1;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -4px rgba(0, 0, 0, 0.02);
    }

    /* 논문 제목 위계 강화 */
    .academic-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #0f172a;
      line-height: 1.4;
      margin: 0;
      padding-right: 100px; /* 버튼과 겹침 방지 여백 */
    }

    /* 학술지 메타데이터 정보 */
    .academic-meta {
      font-size: 0.85rem;
      color: #64748b;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: -4px;
    }

    .academic-meta::before {
      content: "📄";
      font-style: normal;
      font-size: 0.9rem;
    }

    /* 부드러운 분리형 AI 요약 인터페이스 */
    .ai-summary-box {
      background-color: #f8fafc;
      border-left: 4px solid #2563eb; /* 신뢰감을 주는 블루 포인트 바 */
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
    }

    .ai-summary-tag {
      font-size: 0.75rem;
      font-weight: 700;
      color: #2563eb;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ai-summary-tag::before {
      content: "✦";
    }

    .ai-summary-text {
      font-size: 0.9rem;
      color: #334155;
      line-height: 1.55;
      margin: 0;
      word-break: keep-all;
    }

    /* 우측 하단 정렬형 액션 버튼 */
    .view-paper-btn {
      align-self: flex-end;
      background-color: #ffffff;
      color: #2563eb;
      border: 1px solid #e2e8f0;
      padding: 7px 16px;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 6px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
      transition: all 0.2s ease;
      margin-top: 4px;
    }

    .view-paper-btn:hover {
      background-color: #2563eb;
      color: #ffffff;
      border-color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="header-row">
        <div>
          <h1 class="main-title">
            <span class="accent">MOS-ZERO</span>
            <span class="title-rest"> Error Analyzer</span>
          </h1>
          <p class="subtitle">C-V 불량 원인 분류 및 학술 문헌 매칭 시스템</p>
        </div>
        <div class="theme-switcher" role="group" aria-label="테마 선택">
          <button class="theme-btn active" id="themeLight">Light</button>
          <button class="theme-btn" id="themeDark">Dark</button>
        </div>
      </div>
    </header>

    {% if not models_ok %}
    <div class="error-banner">
      모델 파일을 찾을 수 없습니다. <code>output/hybrid_models.pkl</code> 을 확인해주세요.
    </div>
    {% else %}

    <div class="step-bar">
      <div class="step active" id="step1">
        <span class="step-num">1</span>
        <span class="step-label">데이터 로드</span>
      </div>
      <span class="step-arrow">—</span>
      <div class="step" id="step2">
        <span class="step-num">2</span>
        <span class="step-label">축 매핑</span>
      </div>
      <span class="step-arrow">—</span>
      <div class="step" id="step3">
        <span class="step-num">3</span>
        <span class="step-label">분석</span>
      </div>
    </div>

    <section>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".csv,.txt" hidden />
        <div class="upload-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="upload-text-block">
          <div class="upload-label">측정 데이터 파일 선택</div>
          <div class="upload-hint">CSV / TXT — 구분자 자동 감지</div>
        </div>
      </div>
      <div class="file-name hidden" id="fileName"></div>
    </section>

    <div id="colSelectArea" class="hidden">
      <div class="col-row">
        <div class="col-group">
          <label class="col-label">Gate Voltage (X)</label>
          <select id="vCol" class="col-select"></select>
        </div>
        <div class="col-group">
          <label class="col-label">Capacitance (Y)</label>
          <select id="cCol" class="col-select"></select>
        </div>
        <div class="col-group col-btn">
          <button id="analyzeBtn" class="btn-primary">분석 실행</button>
        </div>
      </div>
    </div>

    <div id="loadingArea" class="loading-area hidden">
      <div class="spinner"></div>
      <span>분석 중...</span>
    </div>

    <div id="errorArea" class="error-banner hidden"></div>

    <div id="resultsSection" class="hidden">
      <hr class="divider" />

      <div class="results-grid">
        <div>
          <div class="section-label">Signal Analysis</div>
          <div id="plotlyChart"></div>
        </div>
        <div>
          <div class="section-label">Extracted Features</div>
          <div class="data-card">
            <table class="feature-table">
              <thead><tr><th>Parameter</th><th>Value</th></tr></thead>
              <tbody id="featureBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="section-label" style="margin-top: 2.25rem;">Diagnostic Report</div>
      <div id="reportGrid"></div>
    </div>

    {% endif %}
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
